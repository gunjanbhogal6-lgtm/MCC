pipeline:
  name: "AutoSEO Pipeline"
  version: "2.0.0"  # Updated for Phase 1 enhancements

input:
  directory: "data/input"
  processed_directory: "data/processed"
  cache_directory: "data/cache"
  max_keywords: 100
  required_columns:
    - "Keyword"
    - "Search Volume"
    - "Keyword Difficulty"
    - "CPC"
    - "Position"
    - "URL"
    - "Trends"
    - "Keyword Intents"
    - "SERP Features by Keyword"

# DATA COLLECTION - New Phase 1 Features
data_collection:
  enabled: true
  gsc_enabled: true
  serp_api_enabled: true
  sample_serp_keywords: 20  # Limit SERP API calls due to rate limits
  default_date_range_days: 28  # Default to last 28 days

google_search_console:
  credentials_path: "credentials/gsc_credentials.json"
  token_path: "credentials/gsc_token.json"

serp_api:
  # Set SERPAPI_KEY environment variable
  rate_limit_warning_threshold: 10  # Warn when remaining < 10

llm:
  provider: "n8n"
  endpoint: "https://n8n.crownitsolution.com/webhook/f33386cb-3518-4a91-b928-011a6de0589e"
  timeout: 120
  batch_size: 30
  max_retries: 3
  retry_delay: 2

generation:
  meta_title_max_length: 60
  meta_description_max_length: 160
  primary_keywords_count: 15
  lsi_keywords_count: 20

output:
  site: "vestacall"
  seo_json_path: "sites/vestacall/src/data/seo.json"
  backup_enabled: true
  backup_directory: "data/backups"

git:
  auto_commit: true
  auto_push: true
  branch: "main"
  commit_message_template: "chore(seo): update SEO content - {timestamp}"

logging:
  level: "INFO"
  directory: "logs"
  file_prefix: "pipeline"
